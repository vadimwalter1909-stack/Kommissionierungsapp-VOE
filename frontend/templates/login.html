{% extends "base.html" %}

{% block content %}

<style>
    .login-wrapper {
        display: flex;
        justify-content: center;
        align-items: center;
        height: calc(100vh - 80px);
        padding: 20px;
        background: linear-gradient(135deg, #f5f7fa 0%, #e8ecf3 100%);
    }

    .login-card {
        background: #ffffff;
        padding: 40px 32px;
        border-radius: 14px;
        box-shadow: 0 6px 28px rgba(0,0,0,0.10);
        width: 100%;
        max-width: 380px;
        text-align: center;
        animation: fadeIn 0.4s ease;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .login-title {
        font-size: 1.8rem;
        font-weight: 700;
        margin-bottom: 6px;
        color: #222;
        letter-spacing: -0.5px;
    }

    .login-subtitle {
        font-size: 1rem;
        color: #666;
        margin-bottom: 28px;
    }

    .login-input {
        width: 100%;
        padding: 14px 16px;
        font-size: 1rem;
        border: 1px solid #d0d0d0;
        border-radius: 10px;
        margin-bottom: 18px;
        outline: none;
        transition: all 0.2s;
        background: #fafafa;
    }

    .login-input:focus {
        border-color: #0078d4;
        background: #fff;
        box-shadow: 0 0 0 3px rgba(0,120,212,0.15);
    }

    .login-button {
        width: 100%;
        padding: 14px;
        font-size: 1.05rem;
        font-weight: 600;
        background: #0078d4;
        color: white;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        transition: background 0.2s, transform 0.1s;
    }

    .login-button:hover {
        background: #005fa3;
    }

    .login-button:active {
        transform: scale(0.98);
    }

    .login-error {
        color: #d9534f;
        margin-bottom: 16px;
        font-size: 0.95rem;
        background: #ffe5e5;
        padding: 10px;
        border-radius: 8px;
        border: 1px solid #ffbcbc;
    }

    .login-footer {
        margin-top: 20px;
        font-size: 0.85rem;
        color: #888;
    }
</style>

<div class="login-wrapper">
    <div class="login-card">

        <div class="login-title">VOE Login</div>
        <div class="login-subtitle">Bitte Passwort eingeben</div>

        {% if error %}
            <div class="login-error">{{ error }}</div>
        {% endif %}

        <form method="post" action="/login">
            <input 
                type="password" 
                name="password" 
                class="login-input" 
                placeholder="Passwort eingeben"
                autofocus
            >
            <button class="login-button" type="submit">Anmelden</button>
        </form>

        <div class="login-footer">
            © {{ year }} VOE – Logistik 
        </div>

    </div>
</div>

{% endblock %}
