{% extends "base.html" %}

<div class="dashboard-mini-container">
    <div class="dashboard-mini-tile" style="background: #ffdddd;">
        <div class="mini-left">
            <strong class="mini-kuerzel">Upload nicht möglich</strong>

{% endblock %}
